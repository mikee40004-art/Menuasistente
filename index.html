    function toggleLang() {
        currentLang = currentLang === 'es' ? 'en' : 'es';
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('txtFinalizar').innerText = t.finalizar;
        document.getElementById('lblNombre').innerText = t.nombre;
        document.getElementById('lblHab').innerText = t.hab;
        document.getElementById('lblPago').innerText = t.pago;
        document.getElementById('optCargo').innerText = t.cargo;
        document.getElementById('optTarjeta').innerText = t.tarjeta;
        document.getElementById('btnText').innerText = t.enviar;
        
        // Actualización dinámica de etiquetas del Asistente IA
        document.getElementById('aiTitle').innerText = t.aiTitle;
        document.getElementById('aiInput').placeholder = t.aiPlaceholder;
        
        // Si el chat ya se abrió una vez, actualizamos el mensaje de bienvenida de manera inteligente
        if (chatIniciado) {
            const primerMsg = document.querySelector('#aiMessages .ai-msg.bot');
            if (primerMsg) primerMsg.innerText = t.aiWelcome;
        }

        const nav = document.getElementById('navCats');
        const activeBtn = document.querySelector('.btn-cat.active');
        const activeCat = activeBtn ? activeBtn.getAttribute('data-cat') : 'Desayuno';
        
        nav.innerHTML = t.cats.map((catName, i) => `
            <button class="btn-cat ${t.catsID[i] === activeCat ? 'active' : ''}" 
                    data-cat="${t.catsID[i]}"
                    onclick="filtrar('${t.catsID[i]}', this)">${catName}</button>
        `).join('');
        
        filtrar(activeCat, document.querySelector(`[data-cat="${activeCat}"]`));
        renderCarrito();
    }

    function filtrar(cat, btn) {
        const ahora = new Date();
        const horaActual = ahora.getHours() + (ahora.getMinutes() / 60);
        const horarios = {
            "Desayuno": { inicio: 7.5, fin: 11.75, texto: "7:30 AM - 11:45 AM" },
            "Lunch": { inicio: 11.5, fin: 18.0, texto: "11:30 AM - 6:00 PM" },
            "Cena": { inicio: 18.0, fin: 22.5, texto: "6:00 PM - 10:30 PM" },
            "Postre": { inicio: 7.5, fin: 22.5, texto: "7:30 AM - 10:30 PM" },
            "Bebidas": { inicio: 7.5, fin: 22.5, texto: "7:30 AM - 10:30 PM" },
            "Spa": { inicio: 0, fin: 24, texto: "9:00 AM - 5:00 PM / Pregunte por la promoción del día / Ask about today's special offer." },
            "Experiencias": { inicio: 0, fin: 24, texto: "24h con previa reserva /with prior reservation"},
        };

        const config = horarios[cat];
        const estaAbierto = horaActual >= config.inicio && horaActual <= config.fin;
        
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const grid = document.getElementById('menu-grid');
        const t = translations[currentLang];
        
        let banner = `<div style="grid-column: 1/-1; text-align: center; padding: 10px; background: ${estaAbierto ? '#f1f8e9' : '#fff1f1'}; color: ${estaAbierto ? '#2e7d32' : '#c62828'}; border-radius: 8px; margin-bottom: 10px; font-size: 0.75rem; border: 1px solid">${currentLang === 'es' ? 'Horario' : 'Hours'}: ${config.texto} ${estaAbierto ? '' : ' - ' + t.cerrado}</div>`;
        
        grid.innerHTML = banner + platillos.filter(p => p.c === cat).map((p, i) => {
            const hasImg = p.img && p.img.includes('http');
            const inputID = `note-${cat.replace(/\s+/g, '')}-${i}`;
            
            const placeholderTexto = (cat === "Spa" || cat === "Experiencias") ? t.notasReserva : t.notas;

            return `
            <div class="card ${!hasImg ? 'no-photo' : ''}" style="opacity: ${estaAbierto ? '1' : '0.6'};">
                ${hasImg ? `<img src="${p.img}" class="card-img" loading="lazy">` : ''}
                <div class="card-body">
                    <div class="card-info">
                        <span>${currentLang === 'es' ? p.n_es : p.n_en}</span>
                        <span class="precio">$${p.p.toFixed(2)}</span>
                    </div>
                    <p class="desc">${currentLang === 'es' ? p.d_es : p.d_en}</p>
                    ${estaAbierto ? `
                        <textarea id="${inputID}" placeholder="${placeholderTexto}"></textarea>
                        <button class="btn-add" onclick="agregar('${currentLang==='es'?p.n_es:p.n_en}', ${p.p}, '${inputID}', '${p.c}')">${t.agregar}</button>
                    ` : `<p style="color:#c62828; font-size:0.75rem; font-weight:bold; text-align:center; margin-top:10px;">${t.soloHorario}</p>`}
                </div>
            </div>`;
        }).join('');
    }

    function agregar(nombre, precio, idNota, categoria) {
        const nota = document.getElementById(idNota).value.trim();
        carrito.push({ nombre, precio, nota, categoria });
        document.getElementById(idNota).value = "";
        renderCarrito();
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "✓ OK";
        setTimeout(() => btn.innerText = originalText, 1000);
    }

    function renderCarrito() {
        const lista = document.getElementById('cart-list');
        const resumen = document.getElementById('cart-summary');
        const t = translations[currentLang];

        if(carrito.length === 0) { 
            lista.innerHTML = `<p style="text-align:center; color:#999; font-style:italic; font-size:0.85rem; margin: 20px 0;">Canasta vacía / Empty cart</p>`; 
            resumen.innerHTML = ""; 
            return; 
        }
        
        lista.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom: 2px solid #eee; padding-bottom:5px;"><span style="font-weight:bold;">Items:</span><button onclick="carrito=[];renderCarrito()" style="color:red; border:none; background:none; cursor:pointer; font-size:0.75rem;">${t.vaciar}</button></div>` + 
            carrito.map((item, i) => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f9f9f9; font-size:0.9rem;">
                <span style="flex:1;"><strong>${item.nombre}</strong>${item.nota ? `<br><small style="color:var(--oro);">"${item.nota}"</small>` : ''}</span>
                <span style="white-space:nowrap;">$${item.precio.toFixed(2)} <button onclick="carrito.splice(${i},1);renderCarrito()" style="border:none;background:none;color:#ccc;padding:0 5px;">✕</button></span>
            </div>`).join('');

        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const cargoServicio = carrito.reduce((acc, item) => {
            const porcentaje = (item.categoria === "Experiencias") ? 0.18 : 0.15;
            return acc + (item.precio * porcentaje);
        }, 0);
        const tot = subtotal + cargoServicio;

        resumen.innerHTML = `
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;"><span>${t.sub}:</span><span>$${subtotal.toFixed(2)}</span></div>
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#666;"><span>${t.serv}:</span><span>$${cargoServicio.toFixed(2)}</span></div>
                <div class="total-final"><span>${t.tot}:</span><span>$${tot.toFixed(2)} MXN</span></div>
                <div style="text-align:right; font-size:0.75rem; color:#999; margin-top:5px;">Approx. $${(tot/TIPO_CAMBIO).toFixed(2)} USD</div>
            </div>`;
    }

    function enviarPedido() {
        const nom = document.getElementById('guest-name').value.trim();
        const hab = document.getElementById('room-num').value.trim();
        const pago = document.getElementById('payment-method').value;
        const t = translations[currentLang];
        const btn = document.getElementById('btnSend');

        if(!nom || !hab || carrito.length === 0) {
            const originalText = btn.innerHTML;
            btn.style.background = "#c62828";
            
            if(!nom || !hab) {
                btn.innerText = currentLang === 'es' ? "⚠️ Ingresa nombre y habitación" : "⚠️ Enter name and room";
            } else if(carrito.length === 0) {
                btn.innerText = currentLang === 'es' ? "⚠️ Tu canasta está vacía" : "⚠️ Your cart is empty";
            }

            setTimeout(() => {
                btn.style.background = "#25D366";
                btn.innerHTML = originalText;
            }, 3000);
            return;
        }

        const tieneSpa = carrito.some(item => item.categoria === "Spa");
        const tieneOtros = carrito.some(item => item.categoria !== "Spa"); 

        if (tieneSpa && tieneOtros) {
            btn.innerText = currentLang === 'es' ? "⚠️ Envía Spa y Alimentos por separado" : "⚠️ Send Spa and Food separately";
            btn.style.background = "#c62828";
            setTimeout(() => {
                btn.style.background = "#25D366";
                btn.innerHTML = t.enviar;
            }, 3000);
            return;
        }

        const num = tieneSpa ? "5219981960490" : "5219841870476";
        
        let tipoOrden = "ORDEN";
        if (tieneSpa) {
            tipoOrden = "SPA";
        } else if (carrito.some(item => item.categoria === "Experiencias")) {
            tipoOrden = "Experiencias";
        }

        let msg = `*${tipoOrden} - ANA Y JOSÉ*%0A*Nombre:* ${nom}%0A*Hab:* ${hab}%0A*Pago:* ${pago}%0A---%0A`;
        
        carrito.forEach((item, i) => {
            msg += `${i+1}. *${item.nombre}*%0A${item.nota ? `   _Nota: ${item.nota}_%0A` : ''}`;
        });

        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const serv = carrito.reduce((acc, item) => acc + (item.precio * (item.categoria === "Experiencias" ? 0.18 : 0.15)), 0);
        msg += `---%0A*TOTAL: $${(subtotal + serv).toFixed(2)} MXN*`;

        window.open(`https://wa.me/${num}?text=${msg}`, '_blank', 'noopener');
    }

    function irAExperiencia(tipo) {
        const btns = Array.from(document.querySelectorAll('.btn-cat'));
        const target = btns.find(b => b.innerText.includes(tipo)) || btns.find(b => b.getAttribute('data-cat') === tipo);
        if(target) target.click();
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }

    /* --- LÓGICA LOGÍSTICA DEL ASISTENTE DE IA DEL RESORT --- */
    function toggleAIChat() {
        const win = document.getElementById('aiChatWindow');
        win.classList.toggle('open');
        
        if (win.classList.contains('open') && !chatIniciado) {
            appendAIBubble(translations[currentLang].aiWelcome, 'bot');
            chatIniciado = true;
        }
    }

    function handleAIKeyPress(e) {
        if (e.key === 'Enter') sendAIMessage();
    }

    function sendAIMessage() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if (!text) return;

        appendAIBubble(text, 'user');
        input.value = '';

        // Simulación de delay de respuesta fluida de IA
        setTimeout(() => {
            const respuesta = generateAIResponse(text);
            appendAIBubble(respuesta, 'bot');
        }, 600);
    }

    function appendAIBubble(text, sender) {
        const container = document.getElementById('aiMessages');
        const bubble = document.createElement('div');
        bubble.className = `ai-msg ${sender}`;
        bubble.innerText = text;
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
    }

    function generateAIResponse(input) {
        const cleanInput = input.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        
        // 1. Intención: Opciones Veganas
        if (cleanInput.includes('vegan') || cleanInput.includes('vegetariano') || cleanInput.includes('sin carne')) {
            if (currentLang === 'es') {
                return "🌱 Contamos con opciones excelentes de origen vegetal, como los 'Tacos de setas al recado negro' ($325) o nuestra exquisita 'Pizza vegetariana del huerto' ($325) y el 'Curry de coco' ($290).";
            } else {
                return "🌱 We feature amazing plant-based dishes! Try our 'Recado negro mushroom tacos' ($325), the refreshing 'Vegetarian pizza from our garden' ($325), or the 'Coconut curry' ($290).";
            }
        }

        // 2. Intención: Horarios de Servicio
        if (cleanInput.includes('horario') || cleanInput.includes('hora') || cleanInput.includes('open') || cleanInput.includes('schedule') || cleanInput.includes('cerrado')) {
            let res = currentLang === 'es' ? "🕒 Horarios de Servicio Room Service:\n" : "🕒 Room Service Operating Hours:\n";
            for (const [cat, horario] of Object.entries(horariosGlobales)) {
                res += `• ${cat}: ${horario}\n`;
            }
            return res;
        }

        // 3. Intención: Recomendaciones o Hambre
        if (cleanInput.includes('recomiend') || cleanInput.includes('sugerenc') || cleanInput.includes('sugerencia') || cleanInput.includes('delicioso') || cleanInput.includes('desayunar') || cleanInput.includes('mejor') || cleanInput.includes('best') || cleanInput.includes('breakfast') || cleanInput.includes('rico')) {
            if (currentLang === 'es') {
                return "🌟 Imperdibles de la Casa:\n• Mañana: 'Avocado toast Tulum' ($350) o 'Huevos Doña Ana' ($295).\n• Tarde/Noche: 'Tacos de rib eye al carbón' ($495) o una deliciosa 'Hamburguesa artesanal Ana y José' ($545).\n• Coctel: Nuestra icónica 'Mezcalrita' ($355).";
            } else {
                return "🌟 Chef's Recommendations:\n• Morning: 'Avocado toast Tulum' ($350) or traditional 'Doña Ana eggs' ($295).\n• Lunch/Dinner: 'Charcoal-grilled Rib eye tacos' ($495) or our signature 'Ana & José artisanal burger' ($545).\n• Cocktail: The refreshing 'Mezcalrita' ($355).";
            }
        }

        // 4. Intención: Spa & Relajación
        if (cleanInput.includes('spa') || cleanInput.includes('masaje') || cleanInput.includes('massage') || cleanInput.includes('tired') || cleanInput.includes('relax') || cleanInput.includes('cansado') || cleanInput.includes('bienestar')) {
            if (currentLang === 'es') {
                return "✨ Menu de Spa Ana y José:\n Hola 😊 ¿Te sientes cansado o con el cuerpo tenso? Ven a que te consintamos un rato en nuestro spa. Te vas a ir relajado y con mucha más energía. ¡Agenda tu cita ahora! 💆‍♀️💆‍♂️. Ofrecemos el masaje relajante 'Apapacho' (50 Min - $2460) y la terapia profunda 'Pixán' (70 Min - $2870). Si reservas ahora por Room Service, ¡te incluimos una mascarilla refrescante de cortesía!";
            } else {
                return "✨ Ana y José Spa Menu:\n Hi 😊 Feeling tired or tense? Come and let us pamper you for a while at our spa. You'll leave relaxed and with much more energy. Book your appointment now! 2. We feature our soft-to-medium 'Apapacho' massage (50 Min - $2460) and deep tissue 'Pixán' therapy (70 Min - $2870). Booking through Room Service now includes a complimentary refreshing face mask!";
            }
        }
        // 4. Intención: Recomendaciones o experiencias
        if (cleanInput.includes('experiencias') || cleanInput.includes('sugerenc') || cleanInput.includes('recommend') || cleanInput.includes('romantic dinner') || cleanInput.includes('cena romántica') || cleanInput.includes('aniversary') || cleanInput.includes('aniversario') || cleanInput.includes('special') || cleanInput.includes('birthday') || cleanInput.includes('sorpresa') || cleanInput.includes('surprise') || cleanInput.includes('cumple') || cleanInput.includes('especial')) {
            if (currentLang === 'es') {
                return "🌟 Wao!!! Te recomiendo una cena romántica de 4 tiempos en nuestra Cava o una cena bajo las estrellas en la playa:\n• Montaje privado bajo las estrellas. Incluye: Coctel de bienvenida, menú maridaje con Tequila o Mezcal, Botella de vino de la casa, decoración romántica con pétalos y velas. Selección coordinada de entradas, plato fuerte y postre.";
            } else {
                return "🌟 Wow!!! I recommend a romantic 4-course dinner in our wine cellar or a dinner under the stars on the beach.:\n• Private setup under the stars. Includes: Welcome cocktail, pairing menu with Tequila or Mezcal, House bottle of wine, romantic decoration with petals and candles.";
            }
        }
         // 4. Intención: Soporte WiFi
        if (cleanInput.includes('wifi') || cleanInput.includes('contraseña') || cleanInput.includes('password') || cleanInput.includes('clave') || cleanInput.includes('clue') || cleanInput.includes('red')) {
            if (currentLang === 'es') {
                return "🌟 WiFi:\n• La red es: 'Hotel Ana y José' \n• y la contraseña es: WelcometoParadise";
            } else {
                return "🌟 WiFi:\n• The Wi-Fi network is: Hotel Ana y José.\n• And the password is: WelcometoParadise";
            }
        }
        // 4. Intención: Redirección Dinámica Automática a Concierge/Recepción
        if (cleanInput.includes('concierge') || cleanInput.includes('ayuda') || cleanInput.includes('help') || cleanInput.includes('question') || cleanInput.includes('preguntar')) {
            const numConcierge = "5219841862451"; 
            const textoWhatsApp = currentLang === 'es' ? 'Hola, solicito el apoyo de un Concierge por favor.' : 'Hello, I need assistance from a Concierge please.';
            
            // Disparo automático de WhatsApp tras 1 segundo
            setTimeout(() => {
                window.open(`https://wa.me/${numConcierge}?text=${encodeURIComponent(textoWhatsApp)}`, '_blank', 'noopener');
            }, 1000);

            if (currentLang === 'es') {
                return "🌟 Es un placer poder apoyarle.\n• Ahora te comunico con su concierge vía WhatsApp de manera automática...";
            } else {
                return "🌟 It will be a pleasure to support you.\n• I'm connecting you with your concierge via WhatsApp now...";
            }
        }
        
        // 5. Intención: Búsqueda dinámica en el arreglo de Platillos
        let match = null;
        for (const p of platillos) {
            const nomES = p.n_es.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const nomEN = p.n_en.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            if (cleanInput.includes(nomES) || cleanInput.includes(nomEN) || 
                (nomES.split(' ').some(word => word.length > 4 && cleanInput.includes(word)))) {
                match = p;
                break;
            }
        }

        if (match) {
            if (currentLang === 'es') {
                return `🍽️ ${match.n_es}\n💵 Precio: $${match.p.toFixed(2)} MXN\n📂 Categoría: ${match.c}\n📝 Detalles: ${match.d_es}`;
            } else {
                return `🍽️ ${match.n_en}\n💵 Price: $${match.p.toFixed(2)} MXN\n📂 Category: ${match.c}\n📝 Details: ${match.d_en}`;
            }
        }

        // 6. Respuesta por defecto estructurada
        if (currentLang === 'es') {
            return "Dime qué se te antoja ordenar o si deseas saber los ingredientes de algún platillo (ej. Chilaquiles, Omelette Caribeño, Pizzas, Cocteles o servicios de Spa) y con gusto te doy los detalles.";
        } else {
            return "Tell me what you are looking to order or if you want to know about any item's ingredients (e.g., Chilaquiles, Caribbean Omelette, Pizzas, Cocktails, or Spa treatments) and I will gladly provide the details.";
        }
    }

    updateUI();
</script>
