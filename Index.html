    /* ========================================================
       NUEVAS FUNCIONES: MOCKUP DEL ASISTENTE INTELIGENTE (IA)
       ======================================================== */
    function toggleAIChat() {
        const win = document.getElementById('aiWindow');
        const isOpen = win.style.display === 'flex';
        win.style.display = isOpen ? 'none' : 'flex';
        
        // Si se abre y está vacío, inyectar el mensaje de bienvenida traducido
        if (!isOpen) {
            const msgBox = document.getElementById('aiMessages');
            if (msgBox.children.length <= 0) {
                msgBox.innerHTML = `<div class="msg bot">${translations[currentLang].aiWelcome}</div>`;
            }
        }
    }

    function handleAIPress(e) {
        if(e.key === 'Enter') sendAIMessage();
    }

    function sendAIMessage() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        appendMessage(text, 'user');
        input.value = '';

        setTimeout(() => {
            const respuesta = procesarIAProvisional(text);
            appendMessage(respuesta, 'bot');
        }, 800);
    }

    function appendMessage(text, sender) {
        const box = document.getElementById('aiMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerHTML = text;
        box.appendChild(msgDiv);
        box.scrollTop = box.scrollHeight;
    }

    function procesarIAProvisional(text) {
        const t = text.toLowerCase();
        
        if (currentLang === 'es') {
            if(t.includes('cumpleaños') || t.includes('aniversario') || t.includes('boda') || t.includes('mano') || t.includes('romant') || t.includes('sorprender')) {
                return "❤️ ¡Qué gran celebración! En Ana y José transformamos ocasiones en recuerdos eternos. Te sugiero nuestro montaje premium en playa <strong>'Juntos por Siempre'</strong>. Incluye cena de 4 tiempos bajo las estrellas y decoración fina con velas. ¿Te gustaría que te redirija a la sección de Experiencias?";
            }
            if(t.includes('piscina') || t.includes('alberca') || t.includes('horario') || t.includes('abre') || t.includes('cierra')) {
                return "🏊‍♂️ ¡Por supuesto! Nuestra piscina infinity frente al mar se encuentra abierta de <strong>8:00 AM a 8:00 PM</strong>. Recuerda que puedes ordenar bebidas y cocteles directo desde nuestra sección de Bebidas.";
            }
            if(t.includes('boutique') || t.includes('tienda') || t.includes('comprar') || t.includes('ropa')) {
                return "🛍️ Sí, contamos con la prestigiada boutique 'Ana y José Style' dentro del hotel, justo a un costado del gym. Su horario de atención es de <strong>11am a 8pm</strong>";
            }
            if(t.includes('relaciones') || t.includes('relaciones') || t.includes('paloma') || t.includes('información')) {
                return "🛍️ Es nuestra chica Hostes, que hostes ni que nada, es nuestra relaciones públicas, ella rebien, es la mejor!!!, ella te apoya con toda la info que necesites, muy re bien, sabes, si quieres te puedo pasar su número de wat para que platiques con ella. Su horario de atención es de <strong>24/7</strong>, siempre dispuesta con toda la actitud, solo con decirte que no duerme, no come no bebe porque está pendiente de cualquier necesidad que requieras.";
            }
            if(t.includes('cava') || t.includes('sencillo') || t.includes('cena privada') || t.includes('vino')) {
                return "🍷 ¡Una elección sumamente sofisticada! Nuestra cava privada es un espacio íntimo. Aunque no está listada de forma estándar, nuestro Concierge puede estructurar una degustación de etiquetas premium a tu medida. ¿Te gustaría enlazar con el equipo?";
            }
            return translations.es.aiFallback;
        } else {
            // Respuestas en Inglés (AI responses in English)
            if(t.includes('birthday') || t.includes('anniversary') || t.includes('wedding') || t.includes('proposal') || t.includes('romantic') || t.includes('surprise')) {
                return "❤️ What a beautiful celebration! At Ana y José, we specialize in creating unforgettable milestones. I highly recommend our premium beach setup <strong>'JUNTOS POR SIEMPRE'</strong> (Together Forever), featuring a 4-course dinner under the stars. Would you like me to take you to our Experience category?";
            }
            if(t.includes('pool') || t.includes('hours') || t.includes('open') || t.includes('close')) {
                return "🏊‍♂️ Of course! Our oceanfront infinity pool is open from <strong>8:00 AM to 8:00 PM</strong>. Keep in mind you can order refreshing cocktails right from the Drinks section.";
            }
            if(t.includes('boutique') || t.includes('shop') || t.includes('store') || t.includes('buy')) {
                return "🛍️ Yes, we feature our exclusive boutique 'Tulum Style' inside the property, right next to the main lobby. It is open from <strong>9:00 AM to 7:00 PM</strong>, offering beautiful local designs and beach luxury wear.";
            }
            if(t.includes('cellar') || t.includes('cava') || t.includes('private dinner') || t.includes('wine')) {
                return "🍷 An exquisite choice! Our private wine cellar is a hidden gem. While not on the standard layout, our Concierge can easily design a custom tasting experience for you. Would you like us to connect you?";
            }
            return translations.en.aiFallback;
        }
    }

    /* ========================================================
       LÓGICA OPERATIVA PREVIA (MANTENIDA AL 100%)
       ======================================================== */
    function toggleLang() {
        currentLang = currentLang === 'es' ? 'en' : 'es';
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('txtFinalizar').innerText = t.finalizar;
        document.getElementById('lblNombre').innerText = t.nombre;
        document.getElementById('lblHab').innerText = t.hab;
        document.getElementById('lblPago').innerText = t.pago;
        document.getElementById('optCargo').innerText = t.cargo;
        document.getElementById('optTarjeta').innerText = t.tarjeta;
        document.getElementById('btnText').innerText = t.enviar;
        
        // Actualizar dinámicamente placeholders e interfaz del chat de IA
        document.getElementById('aiInput').placeholder = t.aiPlaceholder;
        const msgBox = document.getElementById('aiMessages');
        // Si el chat está abierto o ya tiene el saludo inicial, actualizar el idioma de ese saludo
        if(msgBox.children.length <= 1) {
            msgBox.innerHTML = `<div class="msg bot">${t.aiWelcome}</div>`;
        }
        
        const nav = document.getElementById('navCats');
        const activeBtn = document.querySelector('.btn-cat.active');
        const activeCat = activeBtn ? activeBtn.getAttribute('data-cat') : 'Desayuno';
        
        nav.innerHTML = t.cats.map((catName, i) => `
            <button class="btn-cat ${t.catsID[i] === activeCat ? 'active' : ''}" 
                    data-cat="${t.catsID[i]}"
                    onclick="filtrar('${t.catsID[i]}', this)">${catName}</button>
        `).join('');
        
        filtrar(activeCat, document.querySelector(`[data-cat="${activeCat}"]`));
        renderCarrito();
    }

    function filtrar(cat, btn) {
        const ahora = new Date();
        const horaActual = ahora.getHours() + (ahora.getMinutes() / 60);
        const horarios = {
            "Desayuno": { inicio: 7.5, fin: 11.75, texto: "7:30 AM - 11:45 AM" },
            "Lunch": { inicio: 11.5, fin: 18.0, texto: "11:30 AM - 6:00 PM" },
            "Cena": { inicio: 18.0, fin: 22.5, texto: "6:00 PM - 10:30 PM" },
            "Postre": { inicio: 7.5, fin: 22.5, texto: "7:30 AM - 10:30 PM" },
            "Bebidas": { inicio: 9.0, fin: 22.5, texto: "9:00 AM - 10:30 PM" },
            "Spa": { inicio: 0, fin: 24, texto: "9:00 AM - 5:00 PM / Pregunte por la promoción del día / Ask about today's special offer." },
            "Experiencias": { inicio: 0, fin: 24, texto: "24h con previa reserva /with prior reservation"},
        };

        const config = horarios[cat];
        const estaAbierto = horaActual >= config.inicio && horaActual <= config.fin;
        
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const grid = document.getElementById('menu-grid');
        const t = translations[currentLang];
        
        let banner = `<div style="grid-column: 1/-1; text-align: center; padding: 10px; background: ${estaAbierto ? '#f1f8e9' : '#fff1f1'}; color: ${estaAbierto ? '#2e7d32' : '#c62828'}; border-radius: 8px; margin-bottom: 10px; font-size: 0.75rem; border: 1px solid">${currentLang === 'es' ? 'Horario' : 'Hours'}: ${config.texto} ${estaAbierto ? '' : ' - ' + t.cerrado}</div>`;
        
        grid.innerHTML = banner + platillos.filter(p => p.c === cat).map((p, i) => {
            const hasImg = p.img && p.img.includes('http');
            const inputID = `note-${cat.replace(/\s+/g, '')}-${i}`;
            
            const placeholderTexto = (cat === "Spa" || cat === "Experiencias") ? t.notasReserva : t.notas;

            return `
            <div class="card ${!hasImg ? 'no-photo' : ''}" style="opacity: ${estaAbierto ? '1' : '0.6'};">
                ${hasImg ? `<img src="${p.img}" class="card-img" loading="lazy">` : ''}
                <div class="card-body">
                    <div class="card-info">
                        <span>${currentLang === 'es' ? p.n_es : p.n_en}</span>
                        <span class="precio">$${p.p}</span>
                    </div>
                    <p class="desc">${currentLang === 'es' ? p.d_es : p.d_en}</p>
                    ${estaAbierto ? `
                        <textarea id="${inputID}" placeholder="${placeholderTexto}"></textarea>
                        <button class="btn-add" onclick="agregar('${currentLang==='es'?p.n_es:p.n_en}', ${p.p}, '${inputID}', '${p.c}')">${t.agregar}</button>
                    ` : `<p style="color:#c62828; font-size:0.75rem; font-weight:bold; text-align:center; margin-top:10px;">${t.soloHorario}</p>`}
                </div>
            </div>`;
        }).join('');
    }

    function agregar(nombre, precio, idNota, categoria) {
        const nota = document.getElementById(idNota).value.trim();
        carrito.push({ nombre, precio, nota, categoria });
        document.getElementById(idNota).value = "";
        renderCarrito();
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "✓ OK";
        setTimeout(() => btn.innerText = originalText, 1000);
    }

    function renderCarrito() {
        const lista = document.getElementById('cart-list');
        const resumen = document.getElementById('cart-summary');
        const t = translations[currentLang];

        if(carrito.length === 0) { 
            lista.innerHTML = `<p style="text-align:center; color:#999; font-style:italic; font-size:0.85rem; margin: 20px 0;">Canasta vacía / Empty cart</p>`; 
            resumen.innerHTML = ""; 
            return; 
        }
        
        lista.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom: 2px solid #eee; padding-bottom:5px;"><span style="font-weight:bold;">Items:</span><button onclick="carrito=[];renderCarrito()" style="color:red; border:none; background:none; cursor:pointer; font-size:0.75rem;">${t.vaciar}</button></div>` + 
            carrito.map((item, i) => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f9f9f9; font-size:0.9rem;">
                <span style="flex:1;"><strong>${item.nombre}</strong>${item.nota ? `<br><small style="color:var(--oro);">"${item.nota}"</small>` : ''}</span>
                <span style="white-space:nowrap;">$${item.precio} <button onclick="carrito.splice(${i},1);renderCarrito()" style="border:none;background:none;color:#ccc;padding:0 5px;">✕</button></span>
            </div>`).join('');

        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const cargoServicio = carrito.reduce((acc, item) => {
            const porcentaje = (item.categoria === "Experiencias") ? 0.18 : 0.15;
            return acc + (item.precio * porcentaje);
        }, 0);
        const tot = subtotal + cargoServicio;

        resumen.innerHTML = `
            <div class="total-box">
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;"><span>${t.sub}:</span><span>$${subtotal.toFixed(2)}</span></div>
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#666;"><span>${t.serv}:</span><span>$${cargoServicio.toFixed(2)}</span></div>
                <div class="total-final"><span>${t.tot}:</span><span>$${tot.toFixed(2)} MXN</span></div>
                <div style="text-align:right; font-size:0.75rem; color:#999; margin-top:5px;">Approx. $${(tot/TIPO_CAMBIO).toFixed(2)} USD</div>
            </div>`;
    }

    function enviarPedido() {
        const nom = document.getElementById('guest-name').value.trim();
        const hab = document.getElementById('room-num').value.trim();
        const pago = document.getElementById('payment-method').value;
        const t = translations[currentLang];
        const btn = document.getElementById('btnSend');

        if(!nom || !hab || carrito.length === 0) {
            const originalText = btn.innerHTML;
            btn.style.background = "#c62828";
            
            if(!nom || !hab) {
                btn.innerText = currentLang === 'es' ? "⚠️ Ingresa nombre y habitación" : "⚠️ Enter name and room";
            } else if(carrito.length === 0) {
                btn.innerText = currentLang === 'es' ? "⚠️ Tu canasta está vacía" : "⚠️ Your cart is empty";
            }

            setTimeout(() => {
                btn.style.background = "#25D366";
                btn.innerHTML = originalText;
            }, 3000);
            return;
        }

        const tieneSpa = carrito.some(item => item.categoria === "Spa");
        const tieneOtros = carrito.some(item => item.categoria !== "Spa"); 

        if (tieneSpa && tieneOtros) {
            btn.innerText = currentLang === 'es' ? "⚠️ Envía Spa y Alimentos por separado" : "⚠️ Send Spa and Food separately";
            btn.style.background = "#c62828";
            setTimeout(() => {
                btn.style.background = "#25D366";
                btn.innerHTML = t.enviar;
            }, 3000);
            return;
        }

        const num = tieneSpa ? "5219841862451" : "5219841862451";
        
        let tipoOrden = "ORDEN";
        if (tieneSpa) {
            tipoOrden = "SPA";
        } else if (carrito.some(item => item.categoria === "Experiencias")) {
            tipoOrden = "Experiencias";
        }

        let msg = `*${tipoOrden} - ANA Y JOSÉ*%0A*Nombre:* ${nom}%0A*Hab:* ${hab}%0A*Pago:* ${pago}%0A---%0A`;
        
        carrito.forEach((item, i) => {
            msg += `${i+1}. *${item.nombre}*%0A${item.nota ? `   _Nota: ${item.nota}_%0A` : ''}`;
        });

        const subtotal = carrito.reduce((acc, item) => acc + item.precio, 0);
        const serv = carrito.reduce((acc, item) => acc + (item.precio * (item.categoria === "Experiencias" ? 0.18 : 0.15)), 0);
        msg += `---%0A*TOTAL: $${(subtotal + serv).toFixed(2)} MXN*`;

        window.open(`https://wa.me/${num}?text=${msg}`, '_blank', 'noopener');
    }

    function irAExperiencia(tipo) {
        const btns = Array.from(document.querySelectorAll('.btn-cat'));
        const target = btns.find(b => b.innerText.includes(tipo)) || btns.find(b => b.getAttribute('data-cat') === tipo);
        if(target) target.click();
        window.scrollTo({ top: 150, behavior: 'smooth' });
    }

    updateUI();
</script>
